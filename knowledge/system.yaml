# ============================================
# 系统运维知识条目
# ============================================

entries:
  # CPU 相关
  - category: system
    symptom: CPU 使用率持续超过 80%
    possible_causes:
      - 应用程序死循环或计算密集型任务
      - 恶意进程或挖矿程序
      - 定时任务在同一时间集中执行
      - 进程数量过多导致上下文切换频繁
    diagnosis_steps:
      - 使用 top -bn1 查看 CPU 占用最高的进程
      - 使用 ps aux --sort=-%cpu | head -20 查看进程列表
      - 检查 crontab 是否有定时任务冲突
      - 使用 strace -p <PID> 跟踪进程系统调用
    solutions:
      - 优化应用代码，减少不必要的计算
      - 使用 nice/ionice 调整进程优先级
      - 分散定时任务执行时间
      - 终止异常进程
      - 扩展 CPU 资源
    severity: high

  - category: system
    symptom: CPU 使用率突然飙升到 100%
    possible_causes:
      - 应用程序死循环
      - 正则表达式回溯攻击
      - 无限递归
      - GC（垃圾回收）频繁触发
    diagnosis_steps:
      - top -bn1 确认占用 CPU 的进程
      - 查看应用最近是否有代码发布
      - 检查应用日志是否有异常
      - 使用 jstack/jmap 分析 Java 应用（如果是 Java）
    solutions:
      - 重启异常应用服务
      - 回滚最近代码变更
      - 优化正则表达式
      - 调整 JVM 参数（如果是 Java）
    severity: critical

  # 内存相关
  - category: system
    symptom: 内存使用率持续增长不释放
    possible_causes:
      - 应用程序内存泄漏
      - 缓存配置不当，缓存无上限
      - 数据库查询结果集过大
      - 日志缓冲区未及时刷盘
    diagnosis_steps:
      - 使用 free -h 查看内存使用趋势
      - 使用 ps aux --sort=-%mem | head -20 查看内存占用最高的进程
      - 使用 pmap -x <PID> 查看进程内存映射
      - 检查应用日志是否有 OOM 记录
      - 检查 dmesg 是否有 OOM Killer 记录
    solutions:
      - 重启泄漏的应用服务（临时缓解）
      - 优化应用代码，修复内存泄漏
      - 配置缓存上限和淘汰策略
      - 增加物理内存
      - 配置 swap 分区（临时方案）
    severity: high

  - category: system
    symptom: OOM Killer 终止了进程
    possible_causes:
      - 物理内存不足
      - 应用程序内存泄漏
      - 数据库缓存配置过大
    diagnosis_steps:
      - dmesg | grep -i oom 查看 OOM 记录
      - free -h 查看当前内存状态
      - 检查被杀进程的内存使用模式
    solutions:
      - 增加物理内存
      - 优化应用内存使用
      - 调整 oom_score_adj 降低被杀优先级
      - 配置 swap 分区
    severity: critical

  # 磁盘相关
  - category: system
    symptom: 磁盘使用率超过 90%
    possible_causes:
      - 日志文件过大未轮转
      - 临时文件未清理
      - Docker 镜像和容器堆积
      - 大文件未删除
      - 数据库数据文件增长
    diagnosis_steps:
      - df -h 查看各分区使用率
      - du -sh /* | sort -rh | head -20 查看目录占用
      - find / -type f -size +100M 2>/dev/null 查找大文件
      - 检查日志轮转配置 /etc/logrotate.d/
    solutions:
      - 清理旧日志文件
      - 配置日志轮转 logrotate
      - 清理 Docker 无用镜像: docker system prune
      - 清理包管理器缓存: apt-get clean
      - 扩展磁盘容量
    severity: high

  - category: system
    symptom: 磁盘 IO 使用率过高
    possible_causes:
      - 大量随机读写
      - 日志写入过于频繁
      - 数据库查询缺少索引
      - 磁盘性能瓶颈
    diagnosis_steps:
      - iostat -x 1 5 查看 IO 统计
      - iotop 查看进程 IO 占用
      - 检查数据库慢查询日志
    solutions:
      - 优化数据库查询，添加索引
      - 使用 SSD 替换 HDD
      - 调整日志级别减少写入
      - 使用缓存减少磁盘读取
    severity: medium

  # ============================================
  # Windows 相关
  # ============================================
  - category: system
    symptom: Windows CPU 使用率持续超过 80%
    possible_causes:
      - 应用程序死循环或计算密集型任务
      - 恶意软件或挖矿程序
      - Windows Update 后台扫描
      - 杀毒软件实时扫描占用过高
      - .NET 运行时 JIT 编译或 GC 回收
    diagnosis_steps:
      - 打开任务管理器或 PowerShell: Get-Process | Sort-Object CPU -Descending | Select-Object -First 10
      - 使用资源监视器(resmon)查看详细进程资源占用
      - 检查事件查看器: Get-WinEvent -LogName System -MaxEvents 50
      - 检查计划任务: Get-ScheduledTask | Where-Object {$_.State -eq 'Ready'}
    solutions:
      - 终止异常进程: Stop-Process -Name <进程名> -Force
      - 调整 Windows Update 计划
      - 排除杀毒软件扫描路径
      - 优化应用程序性能
      - 增加 CPU 资源
    severity: high

  - category: system
    symptom: Windows 内存使用率持续增长不释放
    possible_causes:
      - 应用程序内存泄漏
      - .NET 应用程序未及时释放对象
      - 系统缓存占用过大
      - 驱动程序内存泄漏
    diagnosis_steps:
      - 查看内存占用: Get-Process | Sort-Object WorkingSet64 -Descending | Select-Object -First 10
      - 检查系统缓存: Get-CimInstance Win32_OperatingSystem | Select-Object TotalVisibleMemorySize, FreePhysicalMemory
      - 使用性能监视器检查内存趋势
      - 检查非分页池: Get-CimInstance Win32_PerfFormattedData_PerfOS_Memory
    solutions:
      - 重启泄漏的应用程序服务
      - 优化 .NET 应用程序，检查 Dispose 模式
      - 清理系统缓存: powershell -Command "Clear-Host; $null = [System.GC]::Collect()"
      - 增加物理内存或配置虚拟内存
      - 更新有问题的驱动程序
    severity: high

  - category: system
    symptom: Windows 磁盘使用率超过 90%
    possible_causes:
      - Windows Update 缓存文件过大
      - 临时文件未清理
      - 事件日志文件过大
      - 休眠文件(hiberfil.sys)占用过多空间
      - 页面文件(pagefile.sys)过大
      - 应用程序日志未轮转
    diagnosis_steps:
      - 查看磁盘使用: Get-CimInstance Win32_LogicalDisk -Filter 'DriveType=3'
      - 分析大文件: Get-ChildItem C:\\ -Recurse -ErrorAction SilentlyContinue | Sort-Object Length -Descending | Select-Object -First 20
      - 检查 Windows Update 缓存: Get-ChildItem C:\\Windows\\SoftwareDistribution\\Download -Recurse | Measure-Object -Property Length -Sum
      - 检查临时文件: Get-ChildItem $env:TEMP -Recurse | Measure-Object -Property Length -Sum
    solutions:
      - 清理 Windows Update 缓存: Stop-Service wuauserv; Remove-Item C:\\Windows\\SoftwareDistribution\\Download\\* -Recurse -Force; Start-Service wuauserv
      - 清理临时文件: Remove-Item $env:TEMP\\* -Recurse -Force -ErrorAction SilentlyContinue
      - 清理事件日志: wevtutil cl Application; wevtutil cl System
      - 禁用休眠释放空间: powercfg -h off
      - 磁盘清理: cleanmgr /sagerun:1
      - 扩展磁盘容量
    severity: high

  - category: system
    symptom: Windows 服务无法启动
    possible_causes:
      - 服务依赖的其他服务未启动
      - 服务账户密码过期或错误
      - 服务可执行文件损坏或缺失
      - 端口被其他程序占用
      - 注册表配置错误
      - 权限不足
    diagnosis_steps:
      - 查看服务状态: Get-Service -Name <服务名>
      - 查看服务依赖: Get-Service -Name <服务名> | Select-Object -ExpandProperty RequiredServices
      - 查看事件日志: Get-WinEvent -LogName System | Where-Object {$_.Message -like '*<服务名>*'} | Select-Object -First 10
      - 检查端口占用: netstat -ano | findstr <端口号>
    solutions:
      - 启动依赖服务
      - 更新服务账户密码
      - 修复或重新安装服务
      - 释放被占用的端口
      - 检查并修复注册表
      - 使用 sc.exe 命令管理服务
    severity: critical

  - category: system
    symptom: Windows IIS 网站无法访问
    possible_causes:
      - IIS 服务(W3SVC)未运行
      - 应用程序池停止
      - 网站绑定配置错误
      - 端口被占用
      - SSL 证书过期
      - 应用程序错误（500）
    diagnosis_steps:
      - 检查 IIS 服务状态: Get-Service W3SVC, WAS
      - 检查应用池状态: Get-WebAppPoolState -Name <池名>
      - 检查 IIS 日志: Get-Content C:\\inetpub\\logs\\LogFiles\\*\\*.log -Tail 50
      - 检查 Windows 事件日志中 IIS 相关错误
    solutions:
      - 重启 IIS 服务: Restart-Service W3SVC; Restart-Service WAS
      - 重启应用池: Restart-WebAppPool -Name <池名>
      - 检查网站绑定配置
      - 续期 SSL 证书
      - 检查应用程序代码和配置
    severity: high

  # 网络相关
  - category: network
    symptom: 网络连接超时或拒绝
    possible_causes:
      - 目标服务未启动
      - 防火墙规则阻止
      - DNS 解析失败
      - 网络链路故障
      - TCP 连接数耗尽
    diagnosis_steps:
      - ping 目标地址测试连通性
      - telnet/nc 测试端口连通性
      - nslookup/dig 检查 DNS 解析
      - ss -s 查看 TCP 连接统计
      - iptables -L 查看防火墙规则
    solutions:
      - 启动目标服务
      - 调整防火墙规则
      - 修复 DNS 配置
      - 增加 TCP 连接数上限
      - 检查网络设备和链路
    severity: high

  - category: network
    symptom: TCP 连接数过多
    possible_causes:
      - 连接泄漏（未正确关闭）
      - 高并发请求
      - TIME_WAIT 状态积累
      - SYN Flood 攻击
    diagnosis_steps:
      - ss -s 查看连接统计
      - ss -ant | awk '{print $1}' | sort | uniq -c 按状态统计
      - netstat -antp | grep ESTABLISHED | wc -l
    solutions:
      - 启用 tcp_tw_reuse: sysctl net.ipv4.tcp_tw_reuse=1
      - 减少 TIME_WAIT 超时: sysctl net.ipv4.tcp_fin_timeout=15
      - 增加连接数上限: sysctl net.core.somaxconn=65535
      - 修复应用连接泄漏
      - 配置 SYN Cookie 防御
    severity: medium
